version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chat-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: chat_user
      POSTGRES_PASSWORD: chat_password
      POSTGRES_DB: chat_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: chat-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    restart: always

volumes:
  pgdata:
  redisdata:
